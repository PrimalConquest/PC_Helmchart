global:
  imagePullPolicy: Always
 
ingress:
  host: game.example.com         # CHANGE to your real domain
  tls:
    enabled: true
    secretName: game-tls
    certManager:
      enabled: true
      issuerName: letsencrypt-prod
      issuerKind: ClusterIssuer
  adminCidr:
    - "10.0.0.0/8"               # internal VPN/cluster only — no localhost
 
agonesConfig:
  fleet:
    replicas: 4
  autoscaler:
    bufferSize: 4
    minReplicas: 4
    maxReplicas: 100
 
database:
  dwWrapper:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  postgres:
    storage: 20Gi
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
 
matchmaking:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"