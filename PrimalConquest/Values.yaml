# ── Global settings shared across all subcharts ──────────────────────────────
global:
  registry: ad04a       
  imagePullPolicy: Always
  namespace: PrimalConquest
 
# ── Agones (upstream chart) ───────────────────────────────────────────────────
agones:
  enabled: true
  # Pass-through values for the upstream agones chart.
  # Full list: https://agones.dev/site/docs/installation/install-agones/helm/
  agones:
    featureGates: ""
  gameservers:
    namespaces:
      - PrimalConquest
 
