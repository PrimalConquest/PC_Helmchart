global:
  ingress:
    host: 172.21.44.89
    tls:
      enabled: false
      certManager:
        enabled: false

agones:
  enabled: true
 
agonesConfig:
  fleet:
    replicas: 1                 # one warm server is enough locally
  autoscaler:
    bufferSize: 1
    minReplicas: 1
    maxReplicas: 5
     # fine for local, not for prod
 
database:
  authsecret:
    jwtSecret: ""          # FILL IN — min 32 chars, e.g. openssl rand -base64 32
    internalApiKey: ""     # FILL IN — shared key for pod-to-pod calls, e.g. openssl rand -hex 20

matchmaking:
  queueTimeoutSeconds: 30        # shorter timeout during development