global:
  ingress:
    host: 172.21.44.89
    tls:
      enabled: false
      certManager:
        enabled: false

agones:
  enabled: true
 
agonesConfig:
  fleet:
    replicas: 1                 # one warm server is enough locally
  autoscaler:
    bufferSize: 1
    minReplicas: 1
    maxReplicas: 5
     # fine for local, not for prod
 
matchmaking:
  queueTimeoutSeconds: 30        # shorter timeout during development