{{- if .values.postgres.enabled }}

apiVersion: v1
kind: Deployment
metadata:
  name:  {{ include "database.postgres.deployment.name" . }}
  namespace: {{ .values.global.namespace }}
  labels:
    {{- include "database.postgres.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "database.postgres.labels" . | nindent 6 }}
  strategy:
    type: Recreate             # only one postgres pod at a time — avoid split-brain
  template:
    metadata:
      labels:
        {{- include "database.postgres.labels" . | nindent 8 }}
    spec:
      containers:
        - name: {{.values.postgres.name }}
          image: {{ .values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .values.postgres.name }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .values.dbsecret.name }}
                  key: {{ .values.dbsecret.usernameKey }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .values.dbsecret.name }}
                  key: {{ .values.dbsecret.passwordKey }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: {{ .values.postgres.resources.requests.cpu }}
              memory: {{ .values.postgres.resources.requests.memory }}
            limits:
              cpu: {{ .values.postgres.resources.limits.cpu }}
              memory: {{ .values.postgres.resources.limits.memory }}
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .values.dbsecret.username }}]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{- include "database.postgres.pvc.name" . }}

{{- end }}