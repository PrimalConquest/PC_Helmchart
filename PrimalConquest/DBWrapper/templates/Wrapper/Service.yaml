apiVersion: v1
kind: Service
metadata:
  name: {{ include "database.wrapper.service.name" . }}
  namespace: {{ .values.global.namespace }}
  labels:
    {{- include "database.wrapper.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "database.wrapper.labels" . | nindent 4 }}
  ports:
    - port: {{ .values.dbWrapper.service.port }}
      targetPort: {{ .values.dbWrapper.service.port }}
  type: ClusterIP