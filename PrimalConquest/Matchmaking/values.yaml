global:
  registry: ad04a
  imagePullPolicy: Always
  namespace: primal-conquest
  ingress:
    host: localhost
    tls:
      enabled: false
      secretName: game-tls

matchmaking:
  name: matchmaking
  image:
    repository: primal-conquest-matchmaking
    tag: latest
  service:
    port: 5001
  # Port of the DBWrapper Kubernetes service. The URL is computed dynamically
  # from .Release.Name and .Values.global.namespace — no manual IP or hostname needed.
  dbWrapperPort: 5000
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

# References the same auth-secret created by the DBWrapper subchart.
# Key names must match exactly what DBWrapper's AuthSecrect.yaml writes.
authsecret:
  name: auth-secret
  jwtSecretKey: jwt-secret
  jwtIssuerKey: jwt-issuer
  jwtAudienceKey: jwt-audience
  internalApiKeyKey: internal-api-key

rbac:
  serviceAccountName: matchmaking-sa
  roleName: matchmaking-agones-role
  roleBindingName: matchmaking-agones-binding
