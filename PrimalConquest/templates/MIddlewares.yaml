{{- if .Values.ingress.enabled }}

# ── Middleware: strip /api/<service> prefix ───────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-strip-prefix
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  stripPrefix:
    prefixes:
      - /api/matchmaking
      - /api/loadout
 
---
# ── Middleware: HTTP → HTTPS redirect ────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-redirect-https
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
 
---
# ── Middleware: rate-limit on queue endpoint ──────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-ratelimit
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  rateLimit:
    average: {{ .Values.ingress.rateLimit.average }}
    burst: {{ .Values.ingress.rateLimit.burst }}
 
---
# ── Middleware: IP allowlist for admin/loadout routes ────────────────────────
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-admin-allowlist
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  ipAllowList:
    sourceRange:
      {{- range .Values.ingress.adminCidr }}
      - {{ . | quote }}
      {{- end }}

{{- end }}