{{- if .values.ingress.enabled }}

# ── HTTP IngressRoute — redirect everything to HTTPS ─────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-http
  namespace: {{ .values.global.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ .values.ingress.host }}`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-redirect-https
      #services:
      #  - name: {{ .Release.Name }}-matchmaking
      #    port: {{ .values.matchmaking.service.port }}
 
---
# ── HTTPS IngressRoute — main routing ────────────────────────────────────────
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-https
  namespace: {{ .values.global.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  entryPoints:
    - websecure
  {{- if .values.ingress.tls.enabled }}
  tls:
    secretName: {{ .values.ingress.tls.secretName }}
  {{- end }}
  routes:
    # Matchmaking queue (public)
    - match: Host(`{{ .values.ingress.host }}`) && PathPrefix(`/api/matchmaking`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-strip-prefix
        - name: {{ .Release.Name }}-ratelimit
      services:
        - name: {{ .Release.Name }}-matchmaking
          port: {{ .values.matchmaking.service.port }}
 
    # Loadout CRUD (admin/internal only)
    - match: Host(`{{ .values.ingress.host }}`) && PathPrefix(`/api/loadout`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-strip-prefix
        #- name: {{ .Release.Name }}-admin-allowlist
      services:
        - name: {{ .Release.Name }}-database
          port: {{ .values.dbWrapper.service.port }}
 
{{- if .values.ingress.tls.certManager.enabled }}
---
# ── cert-manager Certificate ──────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls-cert
  namespace: {{ .values.global.namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  secretName: {{ .values.ingress.tls.secretName }}
  issuerRef:
    name: {{ .values.ingress.tls.certManager.issuerName }}
    kind: {{ .values.ingress.tls.certManager.issuerKind }}
  dnsNames:
    - {{ .values.ingress.host }}
{{- end }}


{{- end }}